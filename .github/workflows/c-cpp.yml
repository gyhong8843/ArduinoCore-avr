name: Build Caterina Bootloader

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install AVR Toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-avr binutils-avr avr-libc make

      - name: Build Leonardo Bootloader
        run: |
          cd bootloaders/caterina
          make leonardo
          
      - name: Upload Hex File
        uses: actions/upload-artifact@v3
        with:
          name: Leonardo-Bootloader
          path: bootloaders/caterina/Caterina-Leonardo.hex
