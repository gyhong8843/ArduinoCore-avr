name: Build Caterina Bootloader

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install AVR Toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-avr binutils-avr avr-libc make wget zip

      - name: Download and Setup LUFA
        run: |
          wget https://github.com/abcminiuser/lufa/archive/refs/tags/LUFA-111009.zip
          unzip LUFA-111009.zip
          mv lufa-LUFA-111009 LUFA

      - name: Build Leonardo Bootloader
        run: |
          cd bootloaders/caterina
          # Makefile 안에 leonardo라는 이름이 없을 경우를 대비해 
          # MCU와 VID/PID를 직접 주입하여 'all' 타겟으로 빌드합니다.
          make all MCU=atmega32u4 VID=0x2341 PID=0x0036 F_CPU=16000000 LUFA_PATH=../../LUFA
          
          # 생성된 파일 이름을 확인하고 업로드를 위해 이름을 맞춥니다.
          # (보통 Caterina.hex 또는 Caterina-Leonardo.hex로 생성됨)
          cp *.hex Caterina-Leonardo.hex
          
      - name: Upload Hex File
        uses: actions/upload-artifact@v4
        with:
          name: Leonardo-Bootloader
          path: bootloaders/caterina/Caterina-Leonardo.hex
